[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=simpleFormatter

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
# format=%(levelname)-7s %(asctime)s [%(module)s] %(message)s %(filename)s %(funcName)s %(lineno)d
# format=%(asctime)s %(levelname)s [%(module)s] %(message)s from %(filename)s %(funcName)s %(lineno)d

# NO SE USA
[loggers]
keys=root,selenium,remote_connection,pil

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=fileHandler

[logger_selenium]
level=DEBUG
handlers=fileHandler
qualname=toolium
propagate=0

[logger_remote_connection]
level=DEBUG
handlers=fileHandler
qualname=selenium.webdriver.remote.remote_connection
propagate=0

[logger_pil]
level=DEBUG
handlers=fileHandler
qualname=PIL
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
#formatter=simpleFormatter
args=(sys.stdout,)

